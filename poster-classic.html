<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiche Beerdex - Classique</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --accent-gold: #FFC000;
            --accent-gold-dim: rgba(255, 192, 0, 0.6);
            --text-primary: #ffffff;
            --frame-gold: #FFC000;
        }

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            font-family: 'Inter', sans-serif;
        }

        .poster-container {
            width: 210mm;
            height: 297mm;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20mm;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            /* Dynamic gradient background */
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(255, 192, 0, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 192, 0, 0.06) 0%, transparent 45%),
                linear-gradient(180deg, #0a0a0a 0%, #111111 50%, #0a0a0a 100%);
        }

        /* App Gold Frame */
        .poster-container::after {
            content: '';
            position: absolute;
            top: 7mm;
            left: 7mm;
            right: 7mm;
            bottom: 7mm;
            border: 2mm solid var(--frame-gold);
            pointer-events: none;
            z-index: 10;
        }

        /* Inner Accent Line */
        .poster-container::before {
            content: '';
            position: absolute;
            top: 10mm;
            left: 10mm;
            right: 10mm;
            bottom: 10mm;
            border: 0.5mm solid rgba(255, 192, 0, 0.2);
            pointer-events: none;
            z-index: 5;
        }



        .logo-section {
            text-align: center;
            flex-shrink: 0;
            margin-top: 5mm;
            z-index: 20;
        }

        .logo {
            max-width: 95mm;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 192, 0, 0.35));
        }

        /* Subtitle under the logo */
        .subtitle {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 8pt;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-top: 4mm;
            opacity: 0.8;
            z-index: 20;
        }


        .headline {
            font-family: 'Russo One', sans-serif;
            font-size: 18pt;
            text-align: center;
            line-height: 1.6;
            color: var(--text-primary);
            padding: 0 20mm;
            text-transform: uppercase;
            margin: 0;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            z-index: 20;
            text-shadow: 0 0 40px rgba(255, 192, 0, 0.08);
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000000;
            padding: 6mm;
            border-radius: 4mm;
            border: 2mm solid #ffffff;
            box-shadow:
                0 0 30px rgba(255, 192, 0, 0.15),
                0 0 60px rgba(255, 192, 0, 0.05);
            flex-shrink: 0;
            z-index: 20;
        }

        .qr-code {
            width: 50mm;
            height: 50mm;
            background: #000000;
            padding: 3mm;
            border-radius: 2mm;
        }

        .cta-text {
            font-family: 'Russo One', sans-serif;
            font-size: 14pt;
            margin-top: 6mm;
            letter-spacing: 4px;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2mm;
            margin-top: 5mm;
            flex-shrink: 0;
            z-index: 20;
        }

        .footer-url {
            font-family: 'Russo One', sans-serif;
            font-size: 9pt;
            letter-spacing: 2px;
            color: var(--accent-gold);
            opacity: 0.7;
        }

        .footer-edition {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            opacity: 0.4;
            font-size: 7pt;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Vignette for depth */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.35) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="poster-container">
        <!-- Vignette overlay -->
        <div class="vignette"></div>



        <div class="logo-section">
            <img src="./icons/logo.png" alt="Beerdex Logo" class="logo">
            <div class="subtitle">Votre codex de bière</div>
        </div>


        <div class="headline">
            Remplissez votre codex de bière avec Beerdex et profitez de l'influence de ce musée sur notre application.
        </div>


        <div class="qr-section">
            <img src="./icons/beerdex-qr.svg" alt="QR Code" class="qr-code">
            <div class="cta-text">Scannez pour découvrir</div>
        </div>

        <div class="footer">
            <div class="footer-url">www.beerdex.be</div>
            <div class="footer-edition">Édition Classique</div>
        </div>
    </div>
</body>

</html>
