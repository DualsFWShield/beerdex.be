<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiche Beerdex - Muséum</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Russo+One&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1510;
            --accent-gold: #C9A84C;
            --accent-gold-light: #e8d5a0;
            --text-primary: #f0e6d2;
            --text-secondary: #b8a88a;
            --frame-gold: #C9A84C;
        }

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #0f0d0a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .poster-container {
            width: 210mm;
            height: 297mm;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20mm;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            /* Rich textured background */
            background-image:
                radial-gradient(ellipse at 50% 15%, rgba(201, 168, 76, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 85%, rgba(201, 168, 76, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 20% 50%, rgba(201, 168, 76, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 50%, rgba(201, 168, 76, 0.03) 0%, transparent 40%);
        }

        /* Outer Gold Frame — double border for museum feel */
        .poster-container::after {
            content: '';
            position: absolute;
            top: 7mm;
            left: 7mm;
            right: 7mm;
            bottom: 7mm;
            border: 3mm double var(--frame-gold);
            pointer-events: none;
            z-index: 10;
        }

        /* Inner decorative accent line */
        .poster-container::before {
            content: '';
            position: absolute;
            top: 12mm;
            left: 12mm;
            right: 12mm;
            bottom: 12mm;
            border: 0.3mm solid rgba(201, 168, 76, 0.25);
            pointer-events: none;
            z-index: 10;
        }



        .logo-section {
            text-align: center;
            flex-shrink: 0;
            z-index: 20;
        }

        .logo {
            max-width: 90mm;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(201, 168, 76, 0.4));
        }


        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 22pt;
            text-align: center;
            line-height: 1.5;
            color: var(--accent-gold);
            padding: 0 18mm;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
            margin: 0;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            font-weight: 400;
            font-style: italic;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000000;
            padding: 7mm;
            border-radius: 4mm;
            border: 2mm solid #ffffff;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(201, 168, 76, 0.1);
            flex-shrink: 0;
            position: relative;
            z-index: 20;
        }

        .qr-code {
            width: 50mm;
            height: 50mm;
            background: #000000;
            padding: 4mm;
            border-radius: 2mm;
        }

        .cta-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14pt;
            margin-top: 5mm;
            letter-spacing: 3px;
            color: var(--text-primary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .footer {
            font-family: 'Cormorant Garamond', serif;
            opacity: 0.5;
            font-size: 9pt;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8mm;
            flex-shrink: 0;
            z-index: 20;
            font-weight: 300;
        }

        /* Subtle vignette effect */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="poster-container">
        <!-- Vignette overlay -->
        <div class="vignette"></div>



        <div class="logo-section">
            <img src="./icons/logo.png" alt="Beerdex Logo" class="logo">
        </div>

        <div class="headline">
            Remplissez votre codex de bière avec Beerdex et profitez de l'influence de ce musée sur notre application.
        </div>

        <div class="qr-section">
            <img src="./icons/beerdex-qr.svg" alt="QR Code" class="qr-code">
            <div class="cta-text">Scannez pour découvrir</div>
        </div>

        <div class="footer">
            www.beerdex.be · Édition Spéciale Muséum
        </div>
    </div>
</body>

</html>
